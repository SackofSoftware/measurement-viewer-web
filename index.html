        // ========== Clear / Undo ==========
        // Track temp visual objects so undo can remove them
        let tempVisuals = []; // {type, object} for each temp point/line

        function clearAllMeasurements() {
            const modelId = document.getElementById('model-picker').value;
            deleteAllMeasurementsFromDB(modelId);
            // Remove all measurement-related objects from scene
            const toRemove = [];
            scene.traverse(child => {
                if (child.isMesh && child.geometry instanceof THREE.SphereGeometry) toRemove.push(child);
                if (child.isLine) toRemove.push(child);
                if (child instanceof CSS2DObject) toRemove.push(child);
                if (child.isMesh && child.material && child.material.transparent && child.material.opacity < 0.5 && child.renderOrder === 997) toRemove.push(child);
            });
            toRemove.forEach(obj => {
                scene.remove(obj);
                if (obj.geometry) obj.geometry.dispose();
                if (obj.material) {
                    if (Array.isArray(obj.material)) obj.material.forEach(m => m.dispose());
                    else obj.material.dispose();
                }
            });

            measurements = [];
            window.measurements = measurements;
            pointSphereMap.clear();
            tempPoints = [];
            tempVisuals = [];
            counterCount = 0;
            updateCounterBadge();
            hideMeasureInfo();
            closeSidePanel();
        }

        function undoLastMeasurement() {
            if (measurements.length === 0) return;
            const last = measurements.pop();
            deleteMeasurementFromDB(last);
            // Clear everything and re-render remaining
            const saved = [...measurements];
            clearAllMeasurements();
            // Note: re-rendering saved measurements would require storing all visual objects.
            // For now, undo removes the last and clears visuals. User can redo measurements.
            measurements = saved;
            window.measurements = measurements;
        }

        function undoLastPoint() {
            if (tempPoints.length > 0) {
                tempPoints.pop();
                // Remove last visual marker and line
                if (tempVisuals.length > 0) {
                    const last = tempVisuals.pop();
                    if (last) {
                        scene.remove(last);
                        if (last.geometry) last.geometry.dispose();
                        if (last.material) last.material.dispose();
                    }
                }
                // Also remove the connecting line if there was one
                if (tempVisuals.length > 0 && tempPoints.length > 0) {
                    const lastLine = tempVisuals[tempVisuals.length - 1];
                    if (lastLine && lastLine.isLine) {
                        scene.remove(lastLine);
                        tempVisuals.pop();
                    }
                }
                if (tempPoints.length > 0) {
                    updateMeasureInfo(`${tempPoints.length} points — click to add more, or close polygon`);
                } else {
                    hideMeasureInfo();
                }
            }
        }

        // ========== Measurement Point Dragging ==========
        function removeObj(obj) {
            scene.remove(obj);
            if (obj.geometry) obj.geometry.dispose();
            if (obj.material) {
                if (Array.isArray(obj.material)) obj.material.forEach(m => m.dispose());
                else obj.material.dispose();
            }
        }

        function recalcMeasurement(mIdx) {
            const m = measurements[mIdx];
            if (!m) return;

            // Remove old lines, label, fillMesh — keep spheres
            if (m.lines) m.lines.forEach(l => removeObj(l));
            if (m.label) { scene.remove(m.label); }
            if (m.fillMesh) removeObj(m.fillMesh);

            const pts = m.points;
            if (m.type === 'height') {
                const rebuilt = buildHeightVisuals(pts[0], pts[1]);
                m.lines = rebuilt.lines; m.label = rebuilt.label; m.heightM = rebuilt.heightM;
                // Update sphere positions
                if (m.spheres) { m.spheres[0].position.copy(pts[0]); m.spheres[1].position.copy(pts[1]); }
            } else if (m.type === 'length') {
                const rebuilt = buildLengthVisuals(pts[0], pts[1]);
                m.lines = rebuilt.lines; m.label = rebuilt.label;
                m.dist3D = rebuilt.dist3D; m.distH = rebuilt.distH; m.slopeAngle = rebuilt.slopeAngle;
                if (m.spheres) { m.spheres[0].position.copy(pts[0]); m.spheres[1].position.copy(pts[1]); }
            } else if (m.type === 'area') {
                // Rebuild lines
                const lines = [];
                for (let i = 0; i < pts.length; i++) {
                    lines.push(createLine([pts[i], pts[(i + 1) % pts.length]], 0xa855f7));
                }
                m.lines = lines;
                m.projArea = shoelaceArea(pts.map(p => [p.x, p.z]));
                m.surfArea = triangulatedSurfaceArea(pts);
                m.fillMesh = createPolygonFill(pts, 0x8b5cf6, 0.3);
                const cx = pts.reduce((s, p) => s + p.x, 0) / pts.length;
                const cy = pts.reduce((s, p) => s + p.y, 0) / pts.length;
                const cz = pts.reduce((s, p) => s + p.z, 0) / pts.length;
                m.label = createLabel(formatSqFt(m.surfArea), new THREE.Vector3(cx, cy + 0.5, cz), {
                    bg: 'rgba(139, 92, 246, 0.9)', border: '#a855f7', clickable: true
                });
                if (m.spheres) pts.forEach((p, i) => m.spheres[i].position.copy(p));
            }
            debouncedUpdateMeasurement(m);
        }

        // Collect all measurement spheres for raycasting
        function getMeasurementSpheres() {
            const spheres = [];
            for (const m of measurements) {
                if (m.spheres) spheres.push(...m.spheres);
            }
            return spheres;
        }

        // ========== UI Helpers ==========
        function showMeasureStats(stats) {
            const el = document.getElementById('measure-info');
            el.innerHTML = '';
            for (const [label, value] of Object.entries(stats)) {
                el.innerHTML += `
                    <div class="measure-stat">
                        <span class="measure-stat-label">${label}</span>
                        <span class="measure-stat-value">${value}</span>
                    </div>
                `;
            }
            // Add action buttons
            el.innerHTML += `
                <div style="display:flex;gap:6px;margin-left:8px;border-left:1px solid rgba(255,255,255,0.15);padding-left:10px;">
                    <button class="action-btn" onclick="window._undoLast()" title="Undo last">Undo</button>
                    <button class="action-btn danger" onclick="window._clearAll()" title="Clear all measurements">Clear All</button>
                </div>
            `;
            el.classList.add('show');
        }

        function updateMeasureInfo(text) {
            const el = document.getElementById('measure-info');
            el.innerHTML = `
                <div style="font-size:13px;color:var(--text-dim)">${text}</div>
                <div style="display:flex;gap:6px;margin-left:8px;">
                    <button class="action-btn" onclick="window._undoPoint()" title="Undo last point">Undo Point</button>
                    <button class="action-btn danger" onclick="window._clearAll()" title="Clear all">Clear All</button>
                </div>
            `;
            el.classList.add('show');
        }

        function hideMeasureInfo() {
            document.getElementById('measure-info').classList.remove('show');
        }

        function closeSidePanel() {
            document.getElementById('side-panel').classList.remove('open');
        }

        // ========== Event Handlers ==========

        // Tool selection
        function selectTool(toolName) {
            const btn = document.querySelector(`.tool-btn[data-tool="${toolName}"]`);
            if (!btn) return;

            // Camera button is a toggle, not a tool mode
            if (toolName === 'camera') {
                toggleCameras();
                return;
            }

            // Finish pending polygon if switching tools
            if (currentTool === 'area' && tempPoints.length >= 3 && toolName !== 'area') {
                finishArea();
            }
            if (currentTool === 'volume' && tempPoints.length >= 3 && toolName !== 'volume') {
                finishVolume();
            }

            // Set active (skip camera btn — it's a toggle)
            document.querySelectorAll('.tool-btn:not([data-tool="camera"])').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentTool = toolName;

            // Controls always enabled — drag orbits, click places points
            controls.enabled = true;
            renderer.domElement.classList.toggle('crosshair', toolName !== 'select' && toolName !== 'crop');

            // Close submenu if not area
            if (toolName !== 'area') {
                document.getElementById('area-submenu').classList.remove('show');
            }

            // Crop tool toggle
            if (toolName === 'crop') {
                enableCrop(true);
            } else {
                document.getElementById('crop-panel').style.display = 'none';
            }

            // Hide measure info when switching to non-measurement tools
            if (toolName === 'select' || toolName === 'crop') hideMeasureInfo();
        }

        document.querySelectorAll('.tool-btn[data-tool]').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const tool = btn.dataset.tool;

                // Handle area submenu
                if (tool === 'area') {
                    const submenu = document.getElementById('area-submenu');
                    submenu.classList.toggle('show');
                    e.stopPropagation();
                }

                selectTool(tool);
            });
        });

        // Area submenu
        document.querySelectorAll('.submenu-item[data-area]').forEach(item => {
            item.addEventListener('click', (e) => {
                e.stopPropagation();
                currentAreaMode = item.dataset.area;
                document.querySelectorAll('.submenu-item').forEach(i => i.classList.remove('active'));
                item.classList.add('active');
                document.getElementById('area-submenu').classList.remove('show');

                // Activate area tool
                document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
                document.querySelector('[data-tool="area"]').classList.add('active');
                currentTool = 'area';
                controls.enabled = true;
                renderer.domElement.classList.add('crosshair');
            });
        });

        // Click handler for measurements
        let nearFirstPoint = false; // Track if we're near the first anchor point
        const CLOSE_THRESHOLD = 1.5; // meters — distance to snap to close polygon

        // Click vs drag detection — drag orbits, short click places points
        // Also handles measurement point dragging
        let _mdownX = 0, _mdownY = 0, _mdownTime = 0;
        renderer.domElement.addEventListener('mousedown', (e) => {
            _mdownX = e.clientX; _mdownY = e.clientY; _mdownTime = Date.now();

            // Check if mousedown is on a measurement sphere
            if (_hoveredSphere && pointSphereMap.has(_hoveredSphere)) {
                const info = pointSphereMap.get(_hoveredSphere);
                dragTarget = { sphere: _hoveredSphere, mIdx: info.mIdx, pIdx: info.pIdx };
                isDraggingPoint = true;
                controls.enabled = false; // Disable orbit while dragging point
                renderer.domElement.style.cursor = 'grabbing';
                e.preventDefault();
                e.stopPropagation();
            }
        });
        renderer.domElement.addEventListener('mouseup', (e) => {
            // End point drag
            if (isDraggingPoint) {
                isDraggingPoint = false;
                controls.enabled = true;
                renderer.domElement.style.cursor = 'grab';
                dragTarget = null;
                return;
            }

            if (currentTool === 'select' || currentTool === 'camera' || currentTool === 'crop') return;

            // Only treat as click if mouse didn't move much and was quick
            const dx = e.clientX - _mdownX, dy = e.clientY - _mdownY;
            if (dx * dx + dy * dy > 25 || Date.now() - _mdownTime > 300) return;

            // Don't place points if hovering a measurement sphere
            if (_hoveredSphere) return;

            const hit = getIntersection(e);
            if (!hit) return;

            const point = hit.point;
            const face = hit.face;

            // Check if clicking near first point to close polygon
            if ((currentTool === 'area' || currentTool === 'volume') && tempPoints.length >= 3 && nearFirstPoint) {
                if (currentTool === 'area') finishArea();
                else finishVolume();
                nearFirstPoint = false;
                document.getElementById('close-indicator').style.display = 'none';
                return;
            }

            switch (currentTool) {
                case 'height': handleHeightClick(point, face); break;
                case 'length': handleLengthClick(point, face); break;
                case 'area': handleAreaClick(point, face); break;
                case 'volume': handleVolumeClick(point, face); break;
                case 'counter': handleCounterClick(point); break;
                case 'marker': handleMarkerClick(point); break;
            }
        });

        // Double-click to finish polygon
        renderer.domElement.addEventListener('dblclick', (e) => {
            if (currentTool === 'area' && tempPoints.length >= 3) {
                finishArea();
            }
            if (currentTool === 'volume' && tempPoints.length >= 3) {
                finishVolume();
            }
        });

        // Mouse move for coordinate display + close-polygon indicator + point hover/drag
        let _hoveredSphere = null;
        const _sphereRaycaster = new THREE.Raycaster();
        _sphereRaycaster.params.Mesh = { threshold: 0 };

        renderer.domElement.addEventListener('mousemove', (e) => {
            const el = document.getElementById('coord-display');
            const closeIndicator = document.getElementById('close-indicator');

            // If dragging a measurement point, move it along model surface
            if (isDraggingPoint && dragTarget) {
                const hit = getIntersection(e);
                if (hit) {
                    const p = hit.point;
                    dragTarget.sphere.position.copy(p);
                    measurements[dragTarget.mIdx].points[dragTarget.pIdx].copy(p);
                    recalcMeasurement(dragTarget.mIdx);
                    el.textContent = `X: ${(p.x * M_TO_FT).toFixed(1)}ft  Y: ${(p.y * M_TO_FT).toFixed(1)}ft  Z: ${(p.z * M_TO_FT).toFixed(1)}ft`;
                }
                return;
            }

            // Check hover over measurement spheres
            const rect = renderer.domElement.getBoundingClientRect();
            const mx = ((e.clientX - rect.left) / rect.width) * 2 - 1;
            const my = -((e.clientY - rect.top) / rect.height) * 2 + 1;
            _sphereRaycaster.setFromCamera(new THREE.Vector2(mx, my), camera);
            const spheres = getMeasurementSpheres();
            const sphereHits = spheres.length > 0 ? _sphereRaycaster.intersectObjects(spheres, false) : [];

            if (sphereHits.length > 0) {
                const sphere = sphereHits[0].object;
                if (_hoveredSphere !== sphere) {
                    // Unhover previous
                    if (_hoveredSphere) _hoveredSphere.scale.setScalar(1);
                    _hoveredSphere = sphere;
                    sphere.scale.setScalar(2);
                }
                renderer.domElement.style.cursor = 'grab';
            } else {
                if (_hoveredSphere) { _hoveredSphere.scale.setScalar(1); _hoveredSphere = null; }
                renderer.domElement.style.cursor = '';
            }

            const hit = getIntersection(e);
            if (hit) {
                const p = hit.point;
                el.textContent = `X: ${(p.x * M_TO_FT).toFixed(1)}ft  Y: ${(p.y * M_TO_FT).toFixed(1)}ft  Z: ${(p.z * M_TO_FT).toFixed(1)}ft`;

                // Show close-polygon indicator when hovering near first point
                if ((currentTool === 'area' || currentTool === 'volume') && tempPoints.length >= 3) {
                    const dist = p.distanceTo(tempPoints[0]);
                    if (dist < CLOSE_THRESHOLD) {
                        nearFirstPoint = true;
                        closeIndicator.style.display = 'block';
                        closeIndicator.style.left = e.clientX + 'px';
                        closeIndicator.style.top = e.clientY + 'px';
                        renderer.domElement.classList.add('cursor-close');
                        renderer.domElement.classList.remove('crosshair');
                    } else {
                        nearFirstPoint = false;
                        closeIndicator.style.display = 'none';
                        if (currentTool !== 'select' && currentTool !== 'camera' && currentTool !== 'crop') {
                            renderer.domElement.classList.remove('cursor-close');
                            renderer.domElement.classList.add('crosshair');
                        }
                    }
                }
            } else {
                el.textContent = 'X: — Y: — Z: —';
                nearFirstPoint = false;
                closeIndicator.style.display = 'none';
            }
        });

        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            // Arrow key camera alignment when cameras are visible
            if (camerasVisible && ['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.key)) {
                e.preventDefault();
                const step = e.altKey ? 0.2 : 1.0; // Alt for fine adjustment
                if (e.shiftKey) {
                    // Shift+arrows: elevation
                    if (e.key === 'ArrowUp') window._adjustCameras(0, step, 0);
                    if (e.key === 'ArrowDown') window._adjustCameras(0, -step, 0);
                } else {
                    // Arrows: horizontal
                    if (e.key === 'ArrowUp') window._adjustCameras(0, 0, -step);    // North
                    if (e.key === 'ArrowDown') window._adjustCameras(0, 0, step);   // South
                    if (e.key === 'ArrowLeft') window._adjustCameras(-step, 0, 0);  // West
                    if (e.key === 'ArrowRight') window._adjustCameras(step, 0, 0);  // East
                }
                return;
            }
            switch (e.key.toLowerCase()) {
                case 'v': selectTool('select'); break;
                case 'm': selectTool('marker'); break;
                case 'h': selectTool('height'); break;
                case 'l': selectTool('length'); break;
                case 'a': selectTool('area'); break;
                case 'u': selectTool('volume'); break;
                case 'c': selectTool('counter'); break;
                case 'p': selectTool('camera'); break;
                case 'x': selectTool('crop'); break;
                case 'escape':
                    if (selectedCamera !== null) {
                        returnFromCamera();
                    } else if (tempPoints.length > 0) {
                        tempPoints = [];
                        tempVisuals.forEach(v => scene.remove(v));
                        tempVisuals = [];
                        hideMeasureInfo();
                    }
                    closeSidePanel();
                    document.getElementById('photo-overlay-img').classList.remove('visible');
                    document.getElementById('photo-overlay').classList.remove('show');
                    break;
                case 'enter':
                    if (currentTool === 'area' && tempPoints.length >= 3) finishArea();
                    if (currentTool === 'volume' && tempPoints.length >= 3) finishVolume();
                    break;
                case 'delete':
                case 'backspace':
                    if (e.metaKey || e.ctrlKey) {
                        clearAllMeasurements();
                    }
                    break;
            }
        });

        // selectTool defined above — keyboard shortcuts use it directly

        // Model picker
        document.getElementById('model-picker').addEventListener('change', (e) => {
            loadModel(e.target.value);
        });

        // Close submenu when clicking elsewhere
        document.addEventListener('click', (e) => {
            if (!e.target.closest('[data-tool="area"]') && !e.target.closest('.tool-submenu')) {
                document.getElementById('area-submenu').classList.remove('show');
            }
        });

        // Window resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            labelRenderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Make functions global for inline handlers
        window.closeSidePanel = closeSidePanel;
        window.measurements = measurements;
        window._undoLast = undoLastMeasurement;
        window._undoPoint = undoLastPoint;
        window._clearAll = clearAllMeasurements;
        window._returnFromCamera = returnFromCamera;
        window._flyToCamera = flyToCamera;
        window._setThermal = function(thermal, camIndex) {
            showThermal = thermal;
            const cam = cameraData[camIndex];
            if (cam) {
                showPhotoOverlay(cam);
            }
        };
        // Camera offset adjustment
        function rebuildCamerasWithOffset() {
            buildCameraFrustums();
            if (camerasVisible) {
                cameraFrustums.forEach(cf => { cf.mesh.visible = true; cf.label.visible = true; });
            }
        }
        window._adjustCameras = function(dx = 0, dy = 0, dz = 0) {
            cameraOffset.x += dx;
            cameraOffset.y += dy;
            cameraOffset.z += dz;
            // Sync sliders
            document.getElementById('cam-offset-x').value = cameraOffset.x;
            document.getElementById('cam-offset-y').value = cameraOffset.y;
            document.getElementById('cam-offset-z').value = cameraOffset.z;
            document.getElementById('cam-offset-x-val').textContent = cameraOffset.x.toFixed(1) + 'm';
            document.getElementById('cam-offset-y-val').textContent = cameraOffset.y.toFixed(1) + 'm';
            document.getElementById('cam-offset-z-val').textContent = cameraOffset.z.toFixed(1) + 'm';
            rebuildCamerasWithOffset();
        };
        window._setCameraOffset = function(x, y, z) {
            cameraOffset = { x: x || 0, y: y || 0, z: z || 0 };
            document.getElementById('cam-offset-x').value = cameraOffset.x;
            document.getElementById('cam-offset-y').value = cameraOffset.y;
            document.getElementById('cam-offset-z').value = cameraOffset.z;
            document.getElementById('cam-offset-x-val').textContent = cameraOffset.x.toFixed(1) + 'm';
            document.getElementById('cam-offset-y-val').textContent = cameraOffset.y.toFixed(1) + 'm';
            document.getElementById('cam-offset-z-val').textContent = cameraOffset.z.toFixed(1) + 'm';
            rebuildCamerasWithOffset();
        };
        window._setCamSliders = function() {
            cameraOffset.x = parseFloat(document.getElementById('cam-offset-x').value);
            cameraOffset.y = parseFloat(document.getElementById('cam-offset-y').value);
            cameraOffset.z = parseFloat(document.getElementById('cam-offset-z').value);
            document.getElementById('cam-offset-x-val').textContent = cameraOffset.x.toFixed(1) + 'm';
            document.getElementById('cam-offset-y-val').textContent = cameraOffset.y.toFixed(1) + 'm';
            document.getElementById('cam-offset-z-val').textContent = cameraOffset.z.toFixed(1) + 'm';
            rebuildCamerasWithOffset();
        };
        window.updateMarkerTitle = function(index, title) {
            if (measurements[index]) {
                measurements[index].title = title;
                if (measurements[index].label) {
                    measurements[index].label.element.textContent = title;
                }
                updateMeasurementInDB(measurements[index]);
            }
        };

        // ========== Save/Load View ==========
        window._saveView = async function() {
            await saveViewToDB();
        };

        async function restoreSavedView(modelId) {
            const view = await loadViewFromDB(modelId);
            console.log('[RESTORE] view from DB:', JSON.stringify(view));
            if (!view) return;
            if (view.camera_position) {
                camera.position.set(view.camera_position.x, view.camera_position.y, view.camera_position.z);
            }
            if (view.camera_target) {
                controls.target.set(view.camera_target.x, view.camera_target.y, view.camera_target.z);
            }
            if (view.camera_fov) {
                camera.fov = view.camera_fov;
                camera.updateProjectionMatrix();
            }
            if (view.crop_planes) {
                currentCropPlanes = view.crop_planes;
                // Enable crop FIRST (this sets up sliders to full range)
                enableCrop(true);
                // THEN override slider values with saved crop
                ['x', 'y', 'z'].forEach(axis => {
                    const sMin = document.getElementById(`crop-${axis}-min`);
                    const sMax = document.getElementById(`crop-${axis}-max`);
                    const vMin = document.getElementById(`crop-${axis}-min-val`);
                    const vMax = document.getElementById(`crop-${axis}-max-val`);
                    if (sMin && sMax) {
                        sMin.value = view.crop_planes[`${axis}Min`] * 10;
                        sMax.value = view.crop_planes[`${axis}Max`] * 10;
                        if (vMin) vMin.textContent = `${(view.crop_planes[`${axis}Min`] * M_TO_FT).toFixed(0)}ft`;
                        if (vMax) vMax.textContent = `${(view.crop_planes[`${axis}Max`] * M_TO_FT).toFixed(0)}ft`;
                    }
                });
                // THEN update clip planes with the saved values
                console.log('[RESTORE] after setting sliders - X min:', document.getElementById('crop-x-min').value, 'max:', document.getElementById('crop-x-max').value);
                console.log('[RESTORE] cropEnabled:', cropEnabled);
                updateClipPlanes();
                document.getElementById('crop-panel').style.display = 'none'; // Hide panel but keep crop
            }
            controls.update();
        }

        async function restoreSavedMeasurements(modelId) {
            const rows = await loadMeasurementsFromDB(modelId);
            for (const row of rows) {
                const pts = row.points.map(p => new THREE.Vector3(p.x, p.y, p.z));
                let m;
                if (row.type === 'height' && pts.length >= 2) {
                    const s1 = createPointMarker(pts[0]);
                    const s2 = createPointMarker(pts[1]);
                    m = buildHeightVisuals(pts[0], pts[1]);
                    m.spheres = [s1, s2];
                } else if (row.type === 'length' && pts.length >= 2) {
                    const s1 = createPointMarker(pts[0]);
                    const s2 = createPointMarker(pts[1]);
                    m = buildLengthVisuals(pts[0], pts[1]);
                    m.spheres = [s1, s2];
                } else if (row.type === 'area' && pts.length >= 3) {
                    const spheres = pts.map(p => createPointMarker(p, 0xa855f7));
                    const lines = [];
                    for (let i = 0; i < pts.length; i++) {
                        lines.push(createLine([pts[i], pts[(i + 1) % pts.length]], 0xa855f7));
                    }
                    const surfArea = triangulatedSurfaceArea(pts);
                    const projArea = shoelaceArea(pts.map(p => [p.x, p.z]));
                    const fillMesh = createPolygonFill(pts, 0x8b5cf6, 0.3);
                    const cx = pts.reduce((s, p) => s + p.x, 0) / pts.length;
                    const cy = pts.reduce((s, p) => s + p.y, 0) / pts.length;
                    const cz = pts.reduce((s, p) => s + p.z, 0) / pts.length;
                    const label = createLabel(formatSqFt(surfArea), new THREE.Vector3(cx, cy + 0.5, cz), {
                        bg: 'rgba(139, 92, 246, 0.9)', border: '#a855f7', clickable: true
                    });
                    m = { type: 'area', title: row.title || 'Untitled Area', points: pts, projArea, surfArea, fillMesh, label, spheres, lines };
                } else if (row.type === 'marker' && pts.length >= 1) {
                    const marker = createPointMarker(pts[0], 0xf59e0b);
                    marker.scale.setScalar(1.8);
                    const label = createLabel(row.title || 'Marker', new THREE.Vector3(pts[0].x, pts[0].y + 0.8, pts[0].z), {
                        bg: 'rgba(245, 158, 11, 0.9)', clickable: true
                    });
                    m = { type: 'marker', title: row.title || 'Marker', point: pts[0], label };
                } else {
                    continue;
                }
                if (row.title && m) m.title = row.title;
                m.dbId = row.id;
                measurements.push(m);
                const mIdx = measurements.length - 1;
                if (m.spheres) {
                    m.spheres.forEach((s, pIdx) => pointSphereMap.set(s, { mIdx, pIdx }));
                }
            }
            window.measurements = measurements;
        }

        // ========== Animation Loop ==========
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
            labelRenderer.render(scene, camera);
        }
        animate();

        // Debug: expose to window for console inspection
        window._scene = scene;
        window._meshes = meshes;
        window._camera = camera;
        window._renderer = renderer;

        // ========== Initial Load ==========
        // Load Three Rivers by default, then load cameras + restore saved state
        loadModel('three-rivers').then(async () => {
            loadCameras();
            await restoreSavedView('three-rivers');
            await restoreSavedMeasurements('three-rivers');
        });

    </script>
</body>
</html>
